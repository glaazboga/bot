<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect to Random Bot</title>
    <script>
        // Функция для получения имени бота и редиректа
        function redirectToBot() {
            // URL для получения случайного имени бота
            const apiUrl = 'https://alreferal.ru/get_random_bot_hash.php?hash_id=733e6ebe7d0bed8fa1be8745b8247a5936c04c0e9dda29fdcd4d0174713e123e';
            
            // Выполняем запрос к API
            fetch(apiUrl)
                .then(response => response.text())  // Получаем ответ в текстовом формате
                .then(botName => {
                    if (botName) {
                        // Если получили имя бота, формируем ссылку на Telegram
                        const redirectUrl = `https://t.me/${botName}`;
                        // Выполняем редирект
                        window.location.href = redirectUrl;
                    } else {
                        alert('Failed to get bot name');
                    }
                })
                .catch(error => {
                    console.error('Error fetching bot name:', error);
                    alert('Error fetching bot name');
                });
        }

        // Когда страница загружается, запускаем редирект
        window.onload = redirectToBot;
    </script>
</head>
<body>
    <h1>Redirecting to Telegram Bot...</h1>
</body>
</html>
